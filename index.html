<!DOCTYPE html>
<html>
<head>
  <title>Mission Possible</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GLOBAL ===== */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.6;
  letter-spacing: 0.2px;

  max-width: 600px;
  margin: auto;

  background: linear-gradient(180deg, #eef2f7, #e3eaf3);
  padding: 16px;
}

h2 {
  text-align: center;
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 12px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-radius: 16px;
  margin: 12px 0;

  box-shadow: 0 6px 20px rgba(0,0,0,0.06);

  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== BUTTON ===== */
button {
  border: none;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: 0.15s;
}

button:active {
  transform: scale(0.96);
}

.primary {
  background: linear-gradient(135deg, #4CAF50, #43A047);
  color: white;
}

.danger {
  background: linear-gradient(135deg, #ff4d4f, #d9363e);
  color: white;
}

button:not(.primary):not(.danger) {
  background: #f0f2f5;
}

/* GROUP BUTTON */
.row {
  display: flex;
  gap: 6px;
}

/* ===== INPUT ===== */
input, select {
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
}

/* ===== ACTIVITY ===== */
.activity {
  display: flex;
  align-items: center;
  padding: 10px;
  border-radius: 12px;
}

.activity:hover {
  background: rgba(0,0,0,0.03);
}

.activity input {
  transform: scale(1.2);
}

.activity label {
  margin-left: 12px;
}

.activity input:checked + label {
  text-decoration: line-through;
  opacity: 0.6;
}

.delete-btn {
  margin-left: auto;
  opacity: 0;
}

.activity:hover .delete-btn {
  opacity: 1;
}

/* ===== PROGRESS ===== */
.progress-container {
  height: 22px;
  background: #e5e7eb;
  border-radius: 12px;
}

.progress-bar {
  height: 100%;
  text-align: center;
  color: white;
  font-size: 13px;
}

/* ===== INSIGHT ===== */
.insight-box {
  background: #f0f9ff;
  border-radius: 12px;
  padding: 12px;
  font-size: 14px;
}

/* ===== DARK MODE ===== */
body.dark {
  background: #121212;
  color: white;
}

body.dark .card {
  background: rgba(30,30,30,0.9);
}

body.dark input {
  background: #2a2a2a;
  color: white;
  border: 1px solid #444;
}

body.dark .progress-container {
  background: #333;
}
</style>
</head>

<body>

<h2>Mission Possible 🚀</h2>

<button id="darkModeBtn">🌙 Dark Mode</button>

<div class="card">
  <select id="projectSelect"></select>

  <div class="row">
    <button id="renameProject">Rename</button>
    <button id="deleteProject" class="danger">Delete</button>
  </div>

  <input id="newProject" placeholder="Project baru">
  <button id="addProject" class="primary">Tambah</button>
</div>

<div class="card">
  <div class="row">
    <button id="prevDay">◀</button>
    <span id="dayLabel" style="flex:1;text-align:center;"></span>
    <button id="nextDay">▶</button>
  </div>
</div>

<div class="card">
  <input id="newActivity" placeholder="Tambah aktivitas">
  <button id="addActivity" class="primary">Tambah</button>
</div>

<div class="card" id="activities"></div>

<div class="card">
  <div class="progress-container">
    <div id="progressBar" class="progress-bar">0%</div>
  </div>
  <p id="targetText"></p>
</div>

<div class="card">
  <canvas id="progressChart"></canvas>
</div>

<div class="card">
  <div id="insight" class="insight-box">💡 Insight akan muncul di sini</div>
</div>

<div class="card">
  <button id="showDashboard">📊 Dashboard</button>
  <button id="newWeek">🆕 New Week</button>
  <button id="resetLog">Reset</button>
  <button id="exportCSV">📥 Export CSV</button>
</div>

<div id="weeklyContainer" style="display:none;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

let chart;

let projects = JSON.parse(localStorage.getItem('projects')) || ["General"];
let currentProject = localStorage.getItem('currentProject') || projects[0];

let activitiesPerProject = JSON.parse(localStorage.getItem('activitiesPerProject')) || {
  "General": ["Olahraga","Baca Buku"]
};

let savedData = JSON.parse(localStorage.getItem('dailyTracker')) || {};
let weeklyLog = JSON.parse(localStorage.getItem('weeklyLog')) || [];
let currentDay = parseInt(localStorage.getItem('currentDay')) || 1;

const insightBox = document.getElementById('insight');

function saveAll(){
  localStorage.setItem('projects',JSON.stringify(projects));
  localStorage.setItem('currentProject',currentProject);
  localStorage.setItem('activitiesPerProject',JSON.stringify(activitiesPerProject));
  localStorage.setItem('dailyTracker',JSON.stringify(savedData));
  localStorage.setItem('weeklyLog',JSON.stringify(weeklyLog));
}

function getKey(day, act){
  return `${currentProject}-${day}-${act}`;
}

/* ===== RENDER ===== */
function renderProjects(){
  projectSelect.innerHTML="";
  projects.forEach(p=>{
    let opt=document.createElement('option');
    opt.value=p;
    opt.textContent=p;
    projectSelect.appendChild(opt);
  });
  projectSelect.value=currentProject;
}

function renderDay(){
  let list = activitiesPerProject[currentProject] || [];
  activities.innerHTML="";
  dayLabel.textContent = currentProject + " - Day " + currentDay;

  list.forEach(act=>{
    let div=document.createElement('div');
    div.className='activity';

    let cb=document.createElement('input');
    cb.type='checkbox';
    cb.checked = savedData[getKey(currentDay,act)] || false;

    cb.onchange=()=>{
      savedData[getKey(currentDay,act)] = cb.checked;
      saveAll();
      updateProgress();
      updateChart();
      generateInsight();
    };

    let label=document.createElement('label');
    label.textContent=act;

    let del=document.createElement('button');
    del.textContent="✖";
    del.className="delete-btn";
    del.onclick=()=>{
      activitiesPerProject[currentProject] =
        list.filter(a=>a!==act);
      saveAll();
      renderDay();
    };

    div.append(cb,label,del);
    activities.appendChild(div);
  });

  updateProgress();
  updateChart();
  generateInsight();
}

/* ===== PROGRESS ===== */
function updateProgress(){
  let list = activitiesPerProject[currentProject] || [];
  let done=0;

  list.forEach(a=>{
    if(savedData[getKey(currentDay,a)]) done++;
  });

  let percent = list.length ? Math.round(done/list.length*100) : 0;

  progressBar.style.width=percent+"%";
  progressBar.textContent=percent+"%";
  progressBar.style.background =
    percent<50?'#ff4d4f':
    percent<80?'#faad14':'#52c41a';

  targetText.textContent =
    percent>=80 ? "🔥 Target tercapai!" : "💪 Kejar 80%";
}

/* ===== CHART ===== */
function updateChart(){
  let list = activitiesPerProject[currentProject] || [];
  let data = [];

  for(let d=1; d<=7; d++){
    let done=0;
    list.forEach(a=>{
      if(savedData[`${currentProject}-${d}-${a}`]) done++;
    });

    let percent = list.length ? Math.round(done/list.length*100) : 0;
    data.push(percent);
  }

  if(chart) chart.destroy();

  chart = new Chart(progressChart, {
    type: 'line',
    data: {
      labels: ["D1","D2","D3","D4","D5","D6","D7"],
      datasets: [{
        label: currentProject,
        data: data,
        borderColor: "#4CAF50",
        tension: 0.3
      }]
    }
  });
}

/* ===== AI INSIGHT ===== */
function generateInsight(){
  let list = activitiesPerProject[currentProject] || [];
  let done=0;

  list.forEach(a=>{
    if(savedData[getKey(currentDay,a)]) done++;
  });

  let percent = list.length ? Math.round(done/list.length*100) : 0;

  if(percent===100){
    insightBox.innerHTML="🔥 Perfect consistency!";
  }else if(percent>=70){
    insightBox.innerHTML="👍 Good progress, almost there!";
  }else if(percent>=40){
    insightBox.innerHTML="⚠️ You can push more!";
  }else{
    insightBox.innerHTML="🚨 Low consistency detected!";
  }
}

/* ===== ACTION ===== */
addProject.onclick=()=>{
  let val=newProject.value.trim();
  if(val&&!projects.includes(val)){
    projects.push(val);
    currentProject=val;
    activitiesPerProject[val]=[];
    saveAll();
    renderProjects();
    renderDay();
  }
};

renameProject.onclick=()=>{
  let newName=prompt("Rename project:", currentProject);
  if(newName){
    activitiesPerProject[newName]=activitiesPerProject[currentProject];
    delete activitiesPerProject[currentProject];

    projects = projects.map(p=>p===currentProject?newName:p);
    currentProject=newName;

    saveAll();
    renderProjects();
    renderDay();
  }
};

deleteProject.onclick=()=>{
  if(confirm("Hapus project?")){
    projects = projects.filter(p=>p!==currentProject);
    delete activitiesPerProject[currentProject];
    currentProject=projects[0]||"General";

    saveAll();
    renderProjects();
    renderDay();
  }
};

projectSelect.onchange=()=>{
  currentProject=projectSelect.value;
  saveAll();
  renderDay();
};

addActivity.onclick=()=>{
  let val=newActivity.value.trim();
  if(val){
    activitiesPerProject[currentProject].push(val);
    saveAll();
    renderDay();
  }
};

prevDay.onclick=()=>{
  currentDay=(currentDay-2+7)%7+1;
  localStorage.setItem('currentDay',currentDay);
  renderDay();
};

nextDay.onclick=()=>{
  currentDay=currentDay===7?1:currentDay+1;
  localStorage.setItem('currentDay',currentDay);
  renderDay();
};

darkModeBtn.onclick=()=>{
  document.body.classList.toggle('dark');
};

renderProjects();
renderDay();

});
</script>

</body>
</html>
